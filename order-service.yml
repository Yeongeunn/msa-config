server:
  port: 0

spring:
  application:
    name: order-service
  kafka:
    kafka-server: kafka-service:9092

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 40
        wait-duration-in-open-state: 10s